version: "3.8"

services:
  # Seu container original da Semana 1 (Deixe como estava)
  cs415-ubuntu:
    build: ./ubuntu
    image: image_cs415_ubuntu
    container_name: container_cs415_ubuntu
    restart: always
    stdin_open: true
    tty: true

  # O NOVO container que você está adicionando e que vai ler o novo Dockerfile
  new_ubuntu_service:
    build: ./new-service
    container_name: ubuntu_myuser_container